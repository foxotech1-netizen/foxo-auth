<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FoxO — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#080F1A;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0F2040;border-radius:16px;padding:2.5rem;width:100%;max-width:380px;border:1px solid #1B3A6B;text-align:center}
.msg{font-size:14px;color:#8AAAC0;margin-top:12px;line-height:1.6}
.spinner{width:40px;height:40px;border:3px solid #1B3A6B;border-top-color:#A8D4E8;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#C4622D;font-size:13px;margin-top:12px}
.btn{display:inline-block;margin-top:16px;background:#1B3A6B;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Connexion en cours...<br>Vous allez être redirigé automatiquement.</div>
  <div class="error" id="error" style="display:none"></div>
</div>

<script>
const SUPA_URL = 'https://ljoeupxnpdbbpeaboyzu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxqb2V1cHhucGRiYnBlYWJveXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDAzMzEsImV4cCI6MjA5MjYxNjMzMX0.6l_D_WsNdNHOraqNpXUVs_LFCed6Ep5A7Lg9UWyYLfA';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// Emails admin FoxO — redirigés vers admin.foxo.be
const ADMIN_EMAILS = [
  'info@foxo.be',
  'foxotech1@gmail.com',
  'tech1@foxo.be',
  'tech2@foxo.be'
];

async function redirect() {
  try {
    // Récupérer la session depuis l'URL (token magique)
    const { data: { session }, error } = await supa.auth.getSession();

    if (error || !session) {
      // Attendre que Supabase traite le token de l'URL
      await new Promise(r => setTimeout(r, 2000));
      const { data: { session: s2 } } = await supa.auth.getSession();
      if (!s2) {
        showError('Lien invalide ou expiré. Veuillez vous reconnecter.');
        return;
      }
    }

    const { data: { session: finalSession } } = await supa.auth.getSession();
    if (!finalSession) { showError('Session introuvable.'); return; }

    const email = finalSession.user.email;

    // Déterminer la destination
    if (ADMIN_EMAILS.includes(email)) {
      document.getElementById('msg').textContent = 'Redirection vers l\'interface admin...';
      window.location.href = 'https://admin.foxo.be';
    } else {
      document.getElementById('msg').textContent = 'Redirection vers le portail syndic...';
      window.location.href = 'https://portal.foxo.be';
    }

  } catch(e) {
    showError('Erreur inattendue : ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerHTML = msg + '<br><br><a href="https://admin.foxo.be" class="btn">Admin FoxO</a> &nbsp; <a href="https://portal.foxo.be" class="btn">Portail Syndic</a>';
}

// Lancer la redirection
redirect();
</script>
</body>
</html>
